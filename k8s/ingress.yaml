apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clicker-ingress
  namespace: app
  annotations:
    # Example annotation for nginx ingress controller
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - host: app.kind.cluster
      http:
        paths:
          - path: /(.*)
            pathType: Prefix
            backend:
              service:
                name: clicker-service
                port:
                  number: 80
